app-id: org.fooyin.fooyin
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: fooyin
finish-args:
  - --device=dri
  - --filesystem=xdg-download
  - --filesystem=xdg-music
  - --filesystem=xdg-run/pipewire-0:ro
  - --filesystem=/run/media
  - --own-name=org.mpris.MediaPlayer2.fooyin
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --socket=wayland
  - --system-talk-name=org.freedesktop.UDisks2
  - --talk-name=org.kde.StatusNotifierWatcher # Needed for tray icon
cleanup:
  - '*.a'
  - '*.la'
  - /include
  - /lib/cmake
  - /lib/alsa-lib/pkgconfig
  - /lib/pkgconfig
  - /mkspecs
  - /share/aclocal
  - /share/doc/KDSingleApplication-qt6

modules:
  - name: KDSingleApplication
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DKDSingleApplication_EXAMPLES=OFF
    sources:
      - type: git
        url: https://github.com/KDAB/KDSingleApplication.git
        tag: v1.2.1
        commit: b63420aebb78df20e37310bb090f075990a5a4f6
        x-checker-data:
          type: git
          tag-pattern: v([\d.]+)

  - name: libopenmpt
    config-opts:
      - --disable-examples
      - --disable-openmpt123
      - --disable-static
      - --disable-tests
      - --without-portaudio
      - --without-portaudiocpp
    cleanup:
      - /include
      - '*.la'
      - '*.so'
      - /lib/pkgconfig
      - /share/doc
    sources:
      - type: archive
        url: https://lib.openmpt.org/files/libopenmpt/src/libopenmpt-0.8.6+release.autotools.tar.gz
        sha256: caa2fa959e389f4374d9e2df3af5c633452c12dd80442cba2e89cb7ff2b93c5b
        x-checker-data:
          type: anitya
          project-id: 141468
          stable-only: true
          url-template: https://lib.openmpt.org/files/libopenmpt/src/libopenmpt-$version+release.autotools.tar.gz

  - name: game-music-emu
    buildsystem: cmake-ninja
    cleanup:
      - /include
      - /lib/*.so
      - /lib/pkgconfig
    sources:
      - type: git
        url: https://github.com/libgme/game-music-emu.git
        tag: 0.6.5
        commit: 9e23d10f9fd2a6a2f33b10912dd8dc7153258995
        x-checker-data:
          type: git
          tag-patern: ([\d.]+)

  - name: libebur128
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    sources:
      - type: git
        url: https://github.com/jiixyj/libebur128.git
        tag: v1.2.6
        commit: 67b33abe1558160ed76ada1322329b0e9e058b02
        x-checker-data:
          type: git
          tag-pattern: v([\d.]+)

  - name: soxr
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    sources:
      - type: git
        url: https://github.com/chirlu/soxr.git
        tag: 0.1.3
        commit: 945b592b70470e29f917f4de89b4281fbbd540c0
        x-checker-data:
          type: git
          tag-pattern: ^([\d.]+)$

  - name: soundtouch
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_POSITION_INDEPENDENT_CODE=ON
    sources:
      - type: git
        url: https://codeberg.org/soundtouch/soundtouch.git
        tag: 2.4.1
        commit: 0047e0b1ecfceb041348579119bf79b73a322a3a
        x-checker-data:
          type: git
          tag-pattern: ^([\d.]+)$

  - name: fooyin
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: git
        url: https://github.com/fooyin/fooyin.git
        tag: v0.10.5
        commit: 426318e0272ba0ee5770f68c4cc54c83692735cf
        x-checker-data:
          type: git
          tag-pattern: v([\d.]+)
